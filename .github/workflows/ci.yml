name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Also validates the Gradle wrapper jar and caches dependencies.
      - uses: gradle/actions/setup-gradle@v4

      - name: Show podman/helm versions
        run: |
          podman --version
          helm version

      - name: Build and run tests
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

  examples:
    name: Examples composite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Show podman/helm versions
        run: |
          podman --version
          helm version

      # Exercises the examples the way a real consumer would, via includeBuild('..'),
      # driving the actual podman/helm binaries on the runner.
      - name: Build examples
        run: ./gradlew -p examples build

      - name: Upload example test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: examples-test-reports
          path: examples/*/build/reports/tests/
