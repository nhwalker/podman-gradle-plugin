name: Release

# Publishes the plugin to GitHub Packages when a version tag (v1.2.3) is pushed.
# The Maven version is derived from the tag, overriding the default in build.gradle.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build, test, and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -PpluginVersion="${GITHUB_REF_NAME#v}" build publish
