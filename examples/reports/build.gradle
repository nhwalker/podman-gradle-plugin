// reports — the generic-artifacts plugin, end to end, with no external binaries.
//
// Demonstrates both sides of the attribute-based artifact model in one project:
//   produce  — publish arbitrary files under a classifier + free attributes, and
//              bundle one into the jar resources (importResourcesTask).
//   consume  — resolve them back (self-consumption) and stage them with downloadTask
//              (a plain file) and unpackTask / importUnpackedResourcesTask (an archive).
//   references — arbitrary String constants on the generated ReportRefs interface.
//
// This is the one example that needs neither podman nor helm, so it always runs in the
// plugin's test suite.
plugins {
    id 'java'
    id 'io.github.nhwalker.artifacts'
}

def reportFile = layout.buildDirectory.file('reports/report.txt')
def makeReport = tasks.register('makeReport') {
    outputs.file(reportFile)
    doLast { reportFile.get().asFile.text = 'generated by the reports example\n' }
}

def payload = layout.buildDirectory.file('payload/data.txt')
def makePayload = tasks.register('makePayload') {
    outputs.file(payload)
    doLast { payload.get().asFile.text = 'inside the bundle\n' }
}
def makeBundle = tasks.register('makeBundle', Zip) {
    dependsOn makePayload
    archiveFileName = 'bundle.zip'
    destinationDirectory = layout.buildDirectory.dir('dist')
    from payload
}

genericArtifacts {
    referencesPackage = 'io.github.nhwalker.examples.reports'
    referencesClassName = 'ReportRefs'

    // ---- produce: two artifacts under attribute-based classifiers --------------
    produce {
        report {
            classifier = 'report'
            attribute 'flavor', 'text'
            artifact makeReport.map { reportFile.get() }
            importResourcesTask()                 // also bundle into this jar's resources
        }
        bundle {
            classifier = 'bundle'
            artifact makeBundle.flatMap { it.archiveFile }
        }
    }

    // ---- consume: resolve them back to show the consumer side -------------------
    consume {
        theReport {
            from project(':reports'); classifier = 'report'; attribute 'flavor', 'text'
            downloadTask()                        // -> build/inputs/theReport/report.txt
        }
        theBundle {
            from project(':reports'); classifier = 'bundle'
            unpackTask()                          // -> build/inputs/theBundle/data.txt
            importUnpackedResourcesTask('test')   // -> test resources (build/resources/test/data.txt)
        }
    }

    // ---- references: arbitrary constants on the generated interface -------------
    references {
        deployEnv  { value 'local' }
        bundlePath { value 'data.txt' }
    }
}
